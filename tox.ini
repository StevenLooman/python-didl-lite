[tox]
envlist = py310, py311, py312, py313, py314, ruff, pylint, codespell, mypy, deptry

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312, ruff, pylint, codespell, mypy, deptry
    3.13: py313
    3.14: py314

[testenv]
package = editable
commands = py.test --cov=didl_lite --cov-report=term --cov-report=xml:coverage-{env_name}.xml {posargs}
ignore_errors = True
deps =
    pytest == 9.0.2
    pytest-cov == 7.0.0
    coverage == 7.13.4

[testenv:ruff]
basepython = python3
ignore_errors = True
deps =
    ruff == 0.15.6
commands =
    ruff check didl_lite tests
    ruff format --check didl_lite tests

[testenv:pylint]
basepython = python3
ignore_errors = True
deps =
    pylint == 4.0.4
    pytest == 9.0.2
commands = pylint didl_lite tests

[testenv:codespell]
basepython = python3
ignore_errors = True
deps =
    codespell == 2.4.2
commands = codespell didl_lite tests

[testenv:mypy]
basepython = python3
ignore_errors = True
deps =
    mypy == 1.19.1
    pytest == 9.0.2
commands = mypy --ignore-missing-imports didl_lite tests

[testenv:deptry]
basepython = python3
ignore_errors = True
deps =
    deptry == 0.24.0
commands = deptry .
